<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ferramental DB</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0F1117; color: #E8EAF0; font-family: 'Segoe UI', sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0F1117; }
    ::-webkit-scrollbar-thumb { background: #2A2D36; border-radius: 3px; }
    input, textarea, button { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const { createClient } = supabase;

    const sb = createClient(
      'https://zgdyjwehhagwkgddelqp.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpnZHlqd2VoaGFnd2tnZGRlbHFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNTk5OTMsImV4cCI6MjA5MTkzNTk5M30.2P6wz32TzyJDiPmEE-oL_0EnL2Na9finNmDCmSIWKGw'
    );

    const STATUS = {
      nao_iniciou:  { label: 'Não Iniciou',  color: '#E05C5C', bg: '#E05C5C18', icon: '○' },
      em_andamento: { label: 'Em Andamento', color: '#F5A623', bg: '#F5A62318', icon: '◐' },
      concluido:    { label: 'Concluído',    color: '#00C896', bg: '#00C89618', icon: '✓' },
    };

    const MACHINES = ['laser','torno','fresa','cnc'];
    const MLABELS  = { laser:'Laser', torno:'Torno', fresa:'Fresa', cnc:'CNC' };

    function compress(file) {
      return new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = e => {
          const img = new Image();
          img.onload = () => {
            const cv = document.createElement('canvas');
            const MAX = 800; let w = img.width, h = img.height;
            if (w > MAX || h > MAX) {
              if (w > h) { h = Math.round(h*MAX/w); w = MAX; }
              else       { w = Math.round(w*MAX/h); h = MAX; }
            }
            cv.width = w; cv.height = h;
            cv.getContext('2d').drawImage(img,0,0,w,h);
            cv.toBlob(b => resolve(b), 'image/jpeg', 0.75);
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    function emptyM() { return MACHINES.reduce((a,m)=>({...a,[m]:null}),{}); }

    function MachineRow({ machine, value, onChange }) {
      const st = value ? STATUS[value] : null;
      return (
        <div style={{marginBottom:14}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
            <span style={{fontSize:12,color:'#9CA3AF',fontWeight:600,minWidth:50}}>{MLABELS[machine]}</span>
            {st ? <span style={{fontSize:10,padding:'2px 8px',borderRadius:20,background:st.bg,border:`1px solid ${st.color}50`,color:st.color,fontWeight:700}}>{st.icon} {st.label}</span>
                : <span style={{fontSize:10,color:'#4B5563'}}>Não aplicável</span>}
          </div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            <button onClick={()=>onChange(machine,null)}
              style={{padding:'4px 10px',borderRadius:20,fontSize:11,cursor:'pointer',background:value===null?'#2A2D3699':'transparent',border:`1.5px solid ${value===null?'#6B7280':'#2A2D36'}`,color:value===null?'#E8EAF0':'#4B5563',fontWeight:value===null?700:400}}>—</button>
            {Object.entries(STATUS).map(([key,s]) => (
              <button key={key} onClick={()=>onChange(machine,key)}
                style={{padding:'4px 10px',borderRadius:20,fontSize:11,cursor:'pointer',background:value===key?s.bg:'transparent',border:`1.5px solid ${value===key?s.color:'#2A2D36'}`,color:value===key?s.color:'#4B5563',fontWeight:value===key?700:400}}>
                {s.icon} {s.label}
              </button>
            ))}
          </div>
        </div>
      );
    }

    function App() {
      const [items,    setItems]    = useState([]);
      const [loading,  setLoading]  = useState(true);
      const [filter,   setFilter]   = useState('todos');
      const [search,   setSearch]   = useState('');
      const [modal,    setModal]    = useState(null);
      const [panel,    setPanel]    = useState(false);
      const [saving,   setSaving]   = useState(false);
      const [uploading,setUploading]= useState(false);
      const [msg,      setMsg]      = useState('');
      const [preview,  setPreview]  = useState(null);
      const [blob,     setBlob]     = useState(null);
      const [imgViewer,setImgViewer]= useState(null); // visualizador de imagem ampliada
      const [form,     setForm]     = useState({nome:'',part_number:'',cliente:'',status:'nao_iniciou',obs:'',responsavel:'',...emptyM()});
      const fileRef = useRef();

      useEffect(()=>{ load(); },[]);

      async function load() {
        setLoading(true);
        const {data} = await sb.from('ferramentais').select('*, fotos(url)').order('created_at',{ascending:false});
        setItems(data||[]);
        setLoading(false);
      }

      function showMsg(m) { setMsg(m); setTimeout(()=>setMsg(''),2500); }

      function exportExcel() {
        const SLABELS = { nao_iniciou:'Não Iniciou', em_andamento:'Em Andamento', concluido:'Concluído' };
        const getS = v => v ? (SLABELS[v]||v) : '—';

        const resumo = [
          ['RELATÓRIO DE FERRAMENTAIS','','','','','','','','','','',''],
          ['Gerado em:', new Date().toLocaleString('pt-BR'),'','','','','','','','','',''],
          ['','','','','','','','','','','',''],
          ['Total', items.length, '', 'Concluídos', items.filter(x=>x.status==='concluido').length, '', 'Em Andamento', items.filter(x=>x.status==='em_andamento').length, '', 'Não Iniciados', items.filter(x=>x.status==='nao_iniciou').length,''],
          ['','','','','','','','','','','',''],
        ];

        const header = ['Nº','Nome do Ferramental','Part Number','Cliente','Status Geral','Laser','Torno','Fresa','CNC','Responsável','Observações','Data Registro','Link da Foto'];

        const rows = items.map((p,i) => {
          const fotoUrl = p.fotos?.[0]?.url || '—';
          return [
            i+1,
            p.nome,
            p.part_number||'—',
            p.cliente||'—',
            getS(p.status),
            getS(p.laser),
            getS(p.torno),
            getS(p.fresa),
            getS(p.cnc),
            p.responsavel||'—',
            p.obs||'—',
            new Date(p.created_at).toLocaleDateString('pt-BR'),
            fotoUrl,
          ];
        });

        const wsData = [...resumo, header, ...rows];
        const ws = XLSX.utils.aoa_to_sheet(wsData);

        // Adiciona hiperlinks na coluna de foto (coluna M = índice 12, linha 6 em diante)
        rows.forEach((row, i) => {
          const fotoUrl = row[12];
          if (fotoUrl && fotoUrl !== '—') {
            const cellRef = XLSX.utils.encode_cell({r: resumo.length + 1 + i, c: 12});
            if (!ws[cellRef]) ws[cellRef] = {};
            ws[cellRef].l = { Target: fotoUrl, Tooltip: 'Clique para ver foto' };
            ws[cellRef].v = 'Ver foto';
            ws[cellRef].t = 's';
          }
        });

        ws['!cols'] = [
          {wch:5},{wch:32},{wch:16},{wch:18},{wch:16},{wch:14},{wch:14},{wch:14},{wch:14},{wch:18},{wch:28},{wch:14},{wch:12}
        ];

        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Ferramentais');

        // Aba resumo por máquina
        const maqHeader = ['Máquina','Não Iniciou','Em Andamento','Concluído','Não Aplicável'];
        const maqRows = MACHINES.map(m => [
          MLABELS[m],
          items.filter(x=>x[m]==='nao_iniciou').length,
          items.filter(x=>x[m]==='em_andamento').length,
          items.filter(x=>x[m]==='concluido').length,
          items.filter(x=>!x[m]).length,
        ]);
        const ws2 = XLSX.utils.aoa_to_sheet([
          ['RESUMO POR MÁQUINA','','','',''],
          ['','','','',''],
          maqHeader,
          ...maqRows
        ]);
        ws2['!cols'] = [{wch:15},{wch:14},{wch:16},{wch:12},{wch:14}];
        XLSX.utils.book_append_sheet(wb, ws2, 'Resumo Máquinas');

        // Aba resumo por cliente
        const clientes = [...new Set(items.map(x=>x.cliente||'Sem cliente'))];
        const cliRows = clientes.map(c => {
          const its = items.filter(x=>(x.cliente||'Sem cliente')===c);
          return [
            c,
            its.length,
            its.filter(x=>x.status==='concluido').length,
            its.filter(x=>x.status==='em_andamento').length,
            its.filter(x=>x.status==='nao_iniciou').length,
          ];
        });
        const ws3 = XLSX.utils.aoa_to_sheet([
          ['RESUMO POR CLIENTE','','','',''],
          ['','','','',''],
          ['Cliente','Total','Concluídos','Em Andamento','Não Iniciados'],
          ...cliRows
        ]);
        ws3['!cols'] = [{wch:20},{wch:8},{wch:14},{wch:16},{wch:14}];
        XLSX.utils.book_append_sheet(wb, ws3, 'Resumo Clientes');

        XLSX.writeFile(wb, `ferramentais_${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.xlsx`);
        showMsg('Excel exportado ✓');
      }

      async function handleFile(e) {
        const file = e.target.files[0]; if(!file) return;
        setUploading(true);
        const b = await compress(file);
        setBlob(b); setPreview(URL.createObjectURL(b));
        setUploading(false);
      }

      async function handleAdd() {
        if(!form.nome.trim()) return;
        setSaving(true);
        try {
          const {data:item,error} = await sb.from('ferramentais').insert([{
            nome: form.nome.trim(),
            part_number: form.part_number.trim(),
            cliente: form.cliente.trim(),
            status: form.status,
            obs: form.obs.trim(),
            responsavel: form.responsavel.trim(),
            laser: form.laser, torno: form.torno, fresa: form.fresa, cnc: form.cnc,
          }]).select().single();
          if(error) throw error;
          if(blob) {
            const fn = `${item.id}_${Date.now()}.jpg`;
            const {error:ue} = await sb.storage.from('fotos').upload(fn, blob, {contentType:'image/jpeg'});
            if(!ue) {
              const {data:ud} = sb.storage.from('fotos').getPublicUrl(fn);
              await sb.from('fotos').insert([{ferramental_id:item.id, url:ud.publicUrl}]);
            }
          }
          showMsg('Salvo ✓');
          setForm({nome:'',part_number:'',cliente:'',status:'nao_iniciou',obs:'',responsavel:'',...emptyM()});
          setPreview(null); setBlob(null); setPanel(false);
          if(fileRef.current) fileRef.current.value='';
          load();
        } catch(e) { showMsg('Erro ao salvar'); }
        setSaving(false);
      }

      async function changeStatus(id,status) {
        await sb.from('ferramentais').update({status}).eq('id',id);
        setItems(p=>p.map(x=>x.id===id?{...x,status}:x));
        if(modal?.id===id) setModal(m=>({...m,status}));
      }

      async function changeMachine(id,machine,value) {
        await sb.from('ferramentais').update({[machine]:value}).eq('id',id);
        setItems(p=>p.map(x=>x.id===id?{...x,[machine]:value}:x));
        if(modal?.id===id) setModal(m=>({...m,[machine]:value}));
      }

      async function handleDelete(id) {
        if(!confirm('Remover este ferramental?')) return;
        await sb.from('ferramentais').delete().eq('id',id);
        setItems(p=>p.filter(x=>x.id!==id)); setModal(null);
      }

      const filtered = items.filter(p=>{
        const mf = filter==='todos'||p.status===filter;
        const ms = !search||
          p.nome.toLowerCase().includes(search.toLowerCase())||
          (p.part_number||'').toLowerCase().includes(search.toLowerCase())||
          (p.cliente||'').toLowerCase().includes(search.toLowerCase());
        return mf&&ms;
      });

      const counts = {
        todos: items.length,
        nao_iniciou:  items.filter(p=>p.status==='nao_iniciou').length,
        em_andamento: items.filter(p=>p.status==='em_andamento').length,
        concluido:    items.filter(p=>p.status==='concluido').length,
      };

      const inp = {width:'100%',background:'#0F1117',border:'1.5px solid #2A2D36',borderRadius:10,padding:'10px 14px',color:'#E8EAF0',fontSize:13,outline:'none',boxSizing:'border-box'};

      return (
        <div style={{fontFamily:"'Segoe UI',sans-serif",minHeight:'100vh',background:'#0F1117',color:'#E8EAF0'}}>

          {/* HEADER */}
          <div style={{background:'#16191F',borderBottom:'1px solid #2A2D36',padding:'16px 24px',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <div style={{width:36,height:36,background:'linear-gradient(135deg,#00C896,#0082FF)',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>⚙</div>
              <div>
                <div style={{fontWeight:700,fontSize:16}}>Ferramental DB</div>
                <div style={{fontSize:11,color:'#6B7280'}}>Controle de ferramentais</div>
              </div>
            </div>
            <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
              {msg && <span style={{fontSize:12,color:'#00C896'}}>{msg}</span>}
              <button onClick={exportExcel} style={{background:'#16191F',border:'1.5px solid #2A2D36',color:'#9CA3AF',padding:'9px 16px',borderRadius:8,cursor:'pointer',fontWeight:600,fontSize:13,display:'flex',alignItems:'center',gap:6}}>
                📊 Exportar Excel
              </button>
              <button onClick={()=>setPanel(true)} style={{background:'linear-gradient(135deg,#00C896,#0082FF)',border:'none',color:'#fff',padding:'9px 18px',borderRadius:8,cursor:'pointer',fontWeight:600,fontSize:13}}>
                + Adicionar
              </button>
            </div>
          </div>

          {/* FILTROS */}
          <div style={{display:'flex',gap:10,padding:'16px 24px 0',flexWrap:'wrap',alignItems:'center'}}>
            {[['todos','#6B7280','Todos'],['nao_iniciou','#E05C5C','Não Iniciou'],['em_andamento','#F5A623','Em Andamento'],['concluido','#00C896','Concluído']].map(([key,color,label])=>(
              <button key={key} onClick={()=>setFilter(key)}
                style={{background:filter===key?color+'22':'#16191F',border:`1.5px solid ${filter===key?color:'#2A2D36'}`,borderRadius:10,padding:'8px 16px',cursor:'pointer',color:filter===key?color:'#9CA3AF',fontWeight:filter===key?700:400,fontSize:13,display:'flex',gap:7,alignItems:'center'}}>
                <span style={{fontSize:17,color}}>{counts[key]}</span>{label}
              </button>
            ))}
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar por nome, part number ou cliente..."
              style={{...inp,marginLeft:'auto',minWidth:230,padding:'9px 14px'}}/>
          </div>

          {/* GRID */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(210px,1fr))',gap:16,padding:24}}>
            {loading && <div style={{gridColumn:'1/-1',textAlign:'center',padding:60,color:'#4B5563'}}><div style={{fontSize:24,marginBottom:12}}>⏳</div><div>Carregando...</div></div>}
            {!loading && filtered.length===0 && (
              <div style={{gridColumn:'1/-1',textAlign:'center',padding:60,color:'#4B5563'}}>
                <div style={{fontSize:40,marginBottom:12}}>📷</div>
                <div style={{fontSize:15}}>Nenhum ferramental encontrado</div>
                <div style={{fontSize:12,marginTop:6}}>Clique em "+ Adicionar" para registrar</div>
              </div>
            )}
            {filtered.map(p=>{
              const st = STATUS[p.status]||STATUS.nao_iniciou;
              const foto = p.fotos?.[0]?.url;
              return (
                <div key={p.id} onClick={()=>setModal(p)}
                  style={{background:'#16191F',border:'1.5px solid #2A2D36',borderRadius:14,overflow:'hidden',cursor:'pointer',transition:'transform .15s, border-color .15s'}}
                  onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-3px)';e.currentTarget.style.borderColor=st.color+'60';}}
                  onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.borderColor='#2A2D36';}}>
                  <div style={{height:140,background:'#0F1117',overflow:'hidden',display:'flex',alignItems:'center',justifyContent:'center'}}>
                    {foto ? <img src={foto} alt={p.nome} style={{width:'100%',height:'100%',objectFit:'cover'}}/> : <span style={{fontSize:32,color:'#2A2D36'}}>📷</span>}
                  </div>
                  <div style={{padding:'12px 14px'}}>
                    <div style={{display:'inline-flex',alignItems:'center',gap:5,background:st.bg,border:`1px solid ${st.color}40`,borderRadius:20,padding:'3px 10px',marginBottom:8}}>
                      <span style={{color:st.color,fontSize:11,fontWeight:700}}>{st.icon} {st.label}</span>
                    </div>
                    <div style={{fontWeight:600,fontSize:13,marginBottom:3,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{p.nome}</div>
                    {p.part_number && <div style={{fontSize:11,color:'#6B7280',marginBottom:2}}>PN: {p.part_number}</div>}
                    {p.cliente && <div style={{fontSize:11,color:'#6B7280',marginBottom:6}}>Cliente: {p.cliente}</div>}
                    <div style={{borderTop:'1px solid #2A2D36',paddingTop:8,display:'flex',flexDirection:'column',gap:4}}>
                      {MACHINES.map(m=>{
                        const ms = p[m]?STATUS[p[m]]:null;
                        return (
                          <div key={m} style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                            <span style={{fontSize:11,color:'#6B7280'}}>{MLABELS[m]}</span>
                            {ms ? <span style={{fontSize:10,color:ms.color,fontWeight:700}}>{ms.icon} {ms.label}</span>
                                : <span style={{fontSize:10,color:'#3A3D46'}}>—</span>}
                          </div>
                        );
                      })}
                    </div>
                    <div style={{fontSize:10,color:'#4B5563',marginTop:8}}>{new Date(p.created_at).toLocaleDateString('pt-BR')}</div>
                  </div>
                </div>
              );
            })}
          </div>

          {/* VISUALIZADOR DE IMAGEM AMPLIADA */}
          {imgViewer && (
            <div onClick={()=>setImgViewer(null)}
              style={{position:'fixed',inset:0,background:'#000000CC',display:'flex',alignItems:'center',justifyContent:'center',zIndex:200,padding:20,cursor:'zoom-out'}}>
              <img src={imgViewer} alt="Foto ampliada"
                style={{maxWidth:'95vw',maxHeight:'95vh',borderRadius:12,boxShadow:'0 0 60px #000',objectFit:'contain'}}/>
              <button onClick={()=>setImgViewer(null)}
                style={{position:'absolute',top:20,right:20,background:'#16191F',border:'1.5px solid #2A2D36',borderRadius:50,width:40,height:40,color:'#E8EAF0',fontSize:20,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
            </div>
          )}

          {/* MODAL DETALHE */}
          {modal && (()=>{
            const st = STATUS[modal.status]||STATUS.nao_iniciou;
            const foto = modal.fotos?.[0]?.url;
            return (
              <div onClick={()=>setModal(null)} style={{position:'fixed',inset:0,background:'#00000090',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100,padding:20}}>
                <div onClick={e=>e.stopPropagation()} style={{background:'#16191F',borderRadius:18,width:'100%',maxWidth:500,border:'1.5px solid #2A2D36',overflow:'hidden',maxHeight:'90vh',overflowY:'auto'}}>

                  {/* FOTO COM BOTÃO AMPLIAR */}
                  <div style={{height:220,background:'#0F1117',display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden',position:'relative'}}>
                    {foto
                      ? <>
                          <img src={foto} alt={modal.nome} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
                          <button
                            onClick={e=>{e.stopPropagation();setImgViewer(foto);}}
                            style={{position:'absolute',bottom:10,right:10,background:'#00000099',border:'1.5px solid #ffffff30',borderRadius:8,padding:'6px 12px',color:'#fff',fontSize:12,cursor:'pointer',display:'flex',alignItems:'center',gap:6}}>
                            🔍 Ver foto
                          </button>
                        </>
                      : <span style={{fontSize:48,color:'#2A2D36'}}>📷</span>}
                  </div>

                  <div style={{padding:24}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:18}}>
                      <div>
                        <div style={{fontSize:18,fontWeight:700}}>{modal.nome}</div>
                        {modal.part_number && <div style={{fontSize:13,color:'#6B7280',marginTop:2}}>Part Number: {modal.part_number}</div>}
                        {modal.cliente && <div style={{fontSize:13,color:'#6B7280',marginTop:2}}>Cliente: {modal.cliente}</div>}
                        {modal.responsavel && <div style={{fontSize:13,color:'#6B7280',marginTop:2}}>Responsável: {modal.responsavel}</div>}
                      </div>
                      <div style={{fontSize:11,color:'#4B5563'}}>{new Date(modal.created_at).toLocaleDateString('pt-BR')}</div>
                    </div>

                    <div style={{marginBottom:20}}>
                      <div style={{fontSize:12,color:'#6B7280',marginBottom:8,fontWeight:600}}>Status Geral</div>
                      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                        {Object.entries(STATUS).map(([key,s])=>(
                          <button key={key} onClick={()=>changeStatus(modal.id,key)}
                            style={{background:modal.status===key?s.bg:'transparent',border:`1.5px solid ${modal.status===key?s.color:'#2A2D36'}`,borderRadius:20,padding:'7px 14px',cursor:'pointer',color:modal.status===key?s.color:'#6B7280',fontSize:12,fontWeight:modal.status===key?700:400}}>
                            {s.icon} {s.label}
                          </button>
                        ))}
                      </div>
                    </div>

                    <div style={{marginBottom:20}}>
                      <div style={{fontSize:12,color:'#6B7280',marginBottom:12,fontWeight:600}}>Status por Máquina</div>
                      <div style={{background:'#0F1117',borderRadius:12,padding:'14px 16px'}}>
                        {MACHINES.map(m=>(
                          <MachineRow key={m} machine={m} value={modal[m]} onChange={(mac,val)=>changeMachine(modal.id,mac,val)}/>
                        ))}
                      </div>
                    </div>

                    {modal.obs && <div style={{background:'#0F1117',borderRadius:10,padding:'10px 14px',fontSize:13,color:'#9CA3AF',marginBottom:18}}>{modal.obs}</div>}

                    <div style={{display:'flex',gap:10}}>
                      <button onClick={()=>setModal(null)} style={{flex:1,background:'#2A2D36',border:'none',borderRadius:10,padding:'11px 0',color:'#9CA3AF',cursor:'pointer',fontSize:13}}>Fechar</button>
                      <button onClick={()=>handleDelete(modal.id)} style={{background:'#E05C5C18',border:'1px solid #E05C5C40',borderRadius:10,padding:'11px 18px',color:'#E05C5C',cursor:'pointer',fontSize:13}}>Remover</button>
                    </div>
                  </div>
                </div>
              </div>
            );
          })()}

          {/* PAINEL ADICIONAR */}
          {panel && (
            <div onClick={()=>setPanel(false)} style={{position:'fixed',inset:0,background:'#00000090',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100,padding:20}}>
              <div onClick={e=>e.stopPropagation()} style={{background:'#16191F',borderRadius:18,width:'100%',maxWidth:460,border:'1.5px solid #2A2D36',padding:28,maxHeight:'90vh',overflowY:'auto'}}>
                <div style={{fontSize:16,fontWeight:700,marginBottom:20,display:'flex',justifyContent:'space-between'}}>
                  Adicionar Ferramental
                  <button onClick={()=>setPanel(false)} style={{background:'none',border:'none',color:'#6B7280',cursor:'pointer',fontSize:18}}>✕</button>
                </div>

                {/* UPLOAD FOTO */}
                <div onClick={()=>fileRef.current?.click()}
                  style={{border:'2px dashed #2A2D36',borderRadius:12,minHeight:120,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',marginBottom:16,overflow:'hidden'}}
                  onMouseEnter={e=>e.currentTarget.style.borderColor='#00C896'}
                  onMouseLeave={e=>e.currentTarget.style.borderColor='#2A2D36'}>
                  {uploading ? <div style={{color:'#6B7280',fontSize:13}}>Processando...</div>
                    : preview ? <img src={preview} alt="preview" style={{width:'100%',maxHeight:180,objectFit:'cover'}}/>
                    : <div style={{textAlign:'center',color:'#4B5563',padding:20}}><div style={{fontSize:32,marginBottom:8}}>📸</div><div style={{fontSize:13}}>Clique para selecionar foto</div></div>}
                </div>
                <input ref={fileRef} type="file" accept="image/*" onChange={handleFile} style={{display:'none'}}/>

                {/* CAMPOS */}
                {[
                  ['Nome do Ferramental *','nome','Ex: Molde Painel Porta D/E'],
                  ['Part Number','part_number','Ex: PN-2024-001'],
                  ['Cliente','cliente','Ex: Toyota, Volkswagen...'],
                  ['Responsável','responsavel','Ex: João Silva'],
                ].map(([label,key,ph])=>(
                  <div key={key} style={{marginBottom:14}}>
                    <div style={{fontSize:12,color:'#6B7280',marginBottom:6}}>{label}</div>
                    <input placeholder={ph} value={form[key]} onChange={e=>setForm(f=>({...f,[key]:e.target.value}))} style={inp}/>
                  </div>
                ))}

                {/* STATUS GERAL */}
                <div style={{marginBottom:16}}>
                  <div style={{fontSize:12,color:'#6B7280',marginBottom:8}}>Status Geral</div>
                  <div style={{display:'flex',gap:8}}>
                    {Object.entries(STATUS).map(([key,st])=>(
                      <button key={key} onClick={()=>setForm(f=>({...f,status:key}))}
                        style={{flex:1,background:form.status===key?st.bg:'transparent',border:`1.5px solid ${form.status===key?st.color:'#2A2D36'}`,borderRadius:10,padding:'8px 4px',cursor:'pointer',color:form.status===key?st.color:'#6B7280',fontSize:11,fontWeight:form.status===key?700:400}}>
                        {st.icon} {st.label}
                      </button>
                    ))}
                  </div>
                </div>

                {/* MÁQUINAS */}
                <div style={{marginBottom:16}}>
                  <div style={{fontSize:12,color:'#6B7280',marginBottom:10,fontWeight:600}}>Status por Máquina <span style={{color:'#4B5563',fontWeight:400}}>(opcional)</span></div>
                  <div style={{background:'#0F1117',borderRadius:12,padding:'14px 16px'}}>
                    {MACHINES.map(m=>(
                      <MachineRow key={m} machine={m} value={form[m]} onChange={(mac,val)=>setForm(f=>({...f,[mac]:val}))}/>
                    ))}
                  </div>
                </div>

                {/* OBS */}
                <div style={{marginBottom:20}}>
                  <div style={{fontSize:12,color:'#6B7280',marginBottom:6}}>Observações</div>
                  <textarea placeholder="Informações adicionais..." value={form.obs} onChange={e=>setForm(f=>({...f,obs:e.target.value}))} rows={2} style={{...inp,resize:'none'}}/>
                </div>

                <button onClick={handleAdd} disabled={!form.nome.trim()||saving}
                  style={{width:'100%',background:(!form.nome.trim()||saving)?'#2A2D36':'linear-gradient(135deg,#00C896,#0082FF)',border:'none',borderRadius:12,padding:'13px 0',color:(!form.nome.trim()||saving)?'#4B5563':'#fff',fontWeight:700,fontSize:14,cursor:(!form.nome.trim()||saving)?'not-allowed':'pointer'}}>
                  {saving?'Salvando...':'Salvar Ferramental'}
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
